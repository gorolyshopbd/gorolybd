services:
  nginx:
    image: nginx:alpine
    container_name: shopio-nginx
    restart: unless-stopped
    ports:
      - "0.0.0.0:80:80"
      - "0.0.0.0:443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - backend
      - frontend
    networks:
      - shopio-net

  backend:
    build: ./backend
    container_name: shopio-backend
    restart: unless-stopped
    expose:
      - "5000"
    env_file:
      - ./backend/.env.production
    environment:
      - NODE_ENV=production
      - BACKEND_URL=https://gorolyshop.com
      - FRONTEND_URL=https://gorolyshop.com
      - DATABASE_URL=postgres://postgres:shopio_password_123@db:5432/shopio
    volumes:
      - backend_uploads:/app/uploads
      - backend_data:/app/data
      - backend_config:/app/config
    depends_on:
      - db
    networks:
      - shopio-net

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: https://gorolyshop.com/api
        NEXT_PUBLIC_API_BASE_URL: https://gorolyshop.com
    container_name: shopio-frontend
    restart: unless-stopped
    expose:
      - "3000"
    env_file:
      - ./frontend/.env.production
    depends_on:
      - backend
    networks:
      - shopio-net

  db:
    image: postgres:15-alpine
    container_name: shopio-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: shopio_password_123
      POSTGRES_DB: shopio
    volumes:
      - postgres_data:/var/lib/postgresql/data
    expose:
      - "5432"
    networks:
      - shopio-net

volumes:
  backend_uploads:
  backend_data:
  backend_config:
  postgres_data:

networks:
  shopio-net:
    driver: bridge
