services:
  nginx:
    image: nginx:alpine
    container_name: shopio-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - backend
      - frontend

  backend:
    build: ./backend
    container_name: shopio-backend
    restart: unless-stopped
    expose:
      - "5000"
    env_file:
      - ./backend/.env.production
    environment:
      - NODE_ENV=production
      - BACKEND_URL=https://gorolyshop.com
      - FRONTEND_URL=https://gorolyshop.com
    volumes:
      - backend_uploads:/app/uploads
    depends_on:
      - db

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: https://gorolyshop.com/api
        NEXT_PUBLIC_API_BASE_URL: https://gorolyshop.com
    container_name: shopio-frontend
    restart: unless-stopped
    expose:
      - "3000"
    env_file:
      - ./frontend/.env.production
    depends_on:
      - backend

  db:
    image: postgres:15-alpine
    container_name: shopio-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: shopio_password_123
      POSTGRES_DB: shopio
    volumes:
      - postgres_data:/var/lib/postgresql/data
    expose:
      - "5432"

volumes:
  backend_uploads:
  postgres_data:
