services:
  nginx:
    image: nginx:alpine
    container_name: shopio-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - backend
      - frontend
      - postgrest

  backend:
    build: ./backend
    container_name: shopio-backend
    restart: unless-stopped
    expose:
      - "5000"
    env_file:
      - ./backend/.env.production
    environment:
      - NODE_ENV=production
      - BACKEND_URL=https://gorolyshop.com
      - FRONTEND_URL=https://gorolyshop.com
    volumes:
      - backend_uploads:/app/uploads
    depends_on:
      - postgrest

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: https://gorolyshop.com/api
        NEXT_PUBLIC_API_BASE_URL: https://gorolyshop.com
        NEXT_PUBLIC_INSFORGE_URL: https://gorolyshop.com
        NEXT_PUBLIC_INSFORGE_ANON_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJzdWIiOiIxMjM0NTY3OC0xMjM0LTU2NzgtOTBhYi1jZGVmMTIzNDU2NzgiLCJlbWFpbCI6ImFub25AaW5zZm9yZ2UuY29tIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk5NzcyMjh9.J0pgpMzyXmtwsXlvYx2LA-1_76b5maqA8d7FkfQjm2c
    container_name: shopio-frontend
    restart: unless-stopped
    expose:
      - "3000"
    env_file:
      - ./frontend/.env.production
    depends_on:
      - backend

  db:
    image: postgres:15-alpine
    container_name: shopio-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: shopio_password_123
      POSTGRES_DB: shopio
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./insforge_schema.sql:/docker-entrypoint-initdb.d/schema.sql:ro
    expose:
      - "5432"

  postgrest:
    image: postgrest/postgrest:v12.0.2
    container_name: shopio-postgrest
    restart: unless-stopped
    environment:
      PGRST_DB_URI: postgres://postgres:shopio_password_123@db:5432/shopio
      PGRST_DB_ANON_ROLE: postgres
      PGRST_DB_SCHEMAS: public
      PGRST_SERVER_PORT: 3000
    depends_on:
      - db
    expose:
      - "3000"

volumes:
  backend_uploads:
  postgres_data:
